name: Build OpenWrt IPK (woltool)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: openwrt-sdk
          key: openwrt-sdk-23.05.3-mediatek-filogic

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev zlib1g-dev gawk \
            git subversion file flex gettext libssl-dev python3

      - name: Download OpenWrt SDK (mediatek/filogic)
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          # GL-MT6000 / MT7986 使用 mediatek/filogic 目标，这里选用 OpenWrt 23.05.3 官方 SDK
          SDK_URL="https://downloads.openwrt.org/releases/23.05.3/targets/mediatek/filogic/openwrt-sdk-23.05.3-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          wget "$SDK_URL" -O sdk.tar.xz
          tar -Jxf sdk.tar.xz
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk*" | head -n 1)
          mv "$SDK_DIR" openwrt-sdk

      - name: Copy package into SDK
        run: |
          cp -r package/woltool openwrt-sdk/package/
          cp -r package/luci-app-woltool openwrt-sdk/package/

      - name: Build packages
        run: |
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make package/woltool/{clean,compile} package/luci-app-woltool/{clean,compile} V=sc

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: woltool-ipk
          path: openwrt-sdk/bin/packages/**/*woltool*.ipk

